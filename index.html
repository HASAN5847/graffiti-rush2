<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body { margin:0; overflow:hidden; background:#87CEEB; user-select:none; font-family:Arial; }
#menu, #gameOver, #storyScreen { position:absolute; inset:0; background:rgba(0,0,0,0.9); display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; z-index:10; }
#startBtn, #restartBtn, #continueBtn { padding:20px 60px; font-size:28px; border:none; border-radius:50px; background:#228B22; color:white; font-weight:bold; margin-top:30px; }
.btn { position:absolute; bottom:50px; width:110px; height:110px; border-radius:50%; background:rgba(255,255,255,0.35); display:flex; align-items:center; justify-content:center; color:white; font-size:28px; font-weight:bold; z-index:5; }
#leftBtn { left:30px; }
#rightBtn { right:30px; }
#scoreBoard { position:absolute; top:20px; left:20px; color:white; font-size:28px; font-weight:bold; z-index:5; text-shadow: 2px 2px 4px rgba(0,0,0,0.6); }
#musicBtn { position:absolute; top:20px; right:20px; font-size:32px; background:none; border:none; z-index:5; }
#storyText { max-width:80%; text-align:center; font-size:22px; line-height:1.6; }
</style>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
</head>

<body>
<div id="scoreBoard">SKOR 0</div>
<button id="musicBtn">🔇</button>

<div id="menu">
<h1>KRALIN EZİYETİ</h1>
<button id="startBtn">BASLA</button>
</div>

<div id="storyScreen" style="display:none;">
<h1>HİKAYE</h1>
<p id="storyText">Bir zamanlar sevimli bir topun çok sevdiği bir kız arkadaşı varmış.<br><br>
Kötü şövalyeler kız arkadaşını kaçırmış!<br><br>
Top, yolda altın toplayarak yolun sonunda kız arkadaşını kurtarmak için çabalıyor...</p>
<button id="continueBtn">DEVAM ET →</button>
</div>

<div id="leftBtn" class="btn">←</div>
<div id="rightBtn" class="btn">→</div>

<div id="gameOver" style="display:none;">
<h1>Oyun Bitti!</h1>
<p id="finalScore" style="font-size:26px; margin:10px;"></p>
<button id="restartBtn">TEKRAR OYNA</button>
</div>

<script type="module">
import * as THREE from "three";

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

let camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 2000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.9));
let sunLight = new THREE.DirectionalLight(0xffffff, 0.85);
sunLight.position.set(15, 30, 10);
scene.add(sunLight);

// Güneş ve Bulutlar
let sun = new THREE.Mesh(new THREE.SphereGeometry(4, 32, 32), new THREE.MeshBasicMaterial({color:0xFFD700}));
sun.position.set(25, 35, -300);
scene.add(sun);

for(let i = 0; i < 6; i++){
    let cloud = new THREE.Mesh(new THREE.SphereGeometry(5, 8, 8), new THREE.MeshLambertMaterial({color:0xffffff}));
    cloud.position.set((i%3-1)*25, 28 + Math.random()*8, -400 - i*150);
    cloud.scale.set(1.8, 0.8, 1);
    scene.add(cloud);
}

let audioCtx, musicEnabled=false, musicTimer, score=0, gameRunning=false, speed=2.4;
let velocityY = 0, isJumping = false;
let lastSurprise = 0;
let surpriseKnight = null;
let girlfriendCar = null;
let powerUpColor = null;
let powerUpEndTime = 0;
let isHorrorMode = false;

const scoreBoard = document.getElementById('scoreBoard');
const menu = document.getElementById('menu');
const storyScreen = document.getElementById('storyScreen');
const gameOverScreen = document.getElementById('gameOver');
const finalScoreEl = document.getElementById('finalScore');
const startBtn = document.getElementById('startBtn');
const continueBtn = document.getElementById('continueBtn');
const restartBtn = document.getElementById('restartBtn');
const musicBtn = document.getElementById('musicBtn');
const leftBtn = document.getElementById('leftBtn');
const rightBtn = document.getElementById('rightBtn');

function initAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); audioCtx.resume(); }
function play(freq, t){ let o=audioCtx.createOscillator(); let g=audioCtx.createGain(); o.type="sawtooth"; o.frequency.value=freq; o.connect(g); g.connect(audioCtx.destination); g.gain.value=0.04; o.start(); setTimeout(()=>o.stop(),t); }

function coinSound(){ play(880,60); setTimeout(()=>play(1320,80),50); }
function powerUpSound(){ play(1200,100); setTimeout(()=>play(1500,120),80); setTimeout(()=>play(1800,200),200); }
function jumpSound(){ play(650,70); setTimeout(()=>play(900,100),40); }
function crashSound(){ play(200,300); setTimeout(()=>play(140,500),180); }
function horrorSound(){ play(160,350); setTimeout(()=>play(90,450),200); }
function girlfriendCheer(){ play(900,120); setTimeout(()=>play(1200,150),100); setTimeout(()=>play(1100,180),300); }

// Zemin + Duvarlar
let ground = new THREE.Mesh(new THREE.PlaneGeometry(90,6000), new THREE.MeshLambertMaterial({color:0x3d8c40}));
ground.rotation.x = -Math.PI/2; ground.position.z = -2500; scene.add(ground);

let leftWall = new THREE.Mesh(new THREE.BoxGeometry(3,15,8000), new THREE.MeshLambertMaterial({color:0x444444}));
leftWall.position.set(-19.5, 7, -2500); scene.add(leftWall);
let rightWall = leftWall.clone(); rightWall.position.x = 19.5; scene.add(rightWall);

// Temiz Top
let player = new THREE.Group();
let body = new THREE.Mesh(new THREE.SphereGeometry(1.8, 32, 32), new THREE.MeshPhongMaterial({color:0xffee88, shininess:80}));
player.add(body);
let eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshPhongMaterial({color:0xffffff}));
eyeL.position.set(-0.6, 0.6, 1.4); player.add(eyeL);
let eyeR = eyeL.clone(); eyeR.position.x = 0.6; player.add(eyeR);
let pupilL = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), new THREE.MeshPhongMaterial({color:0x222222}));
pupilL.position.set(-0.6, 0.6, 1.7); player.add(pupilL);
let pupilR = pupilL.clone(); pupilR.position.x = 0.6; player.add(pupilR);
let smile = new THREE.Mesh(new THREE.TorusGeometry(0.7, 0.12, 8, 20), new THREE.MeshPhongMaterial({color:0x222222}));
smile.position.set(0, -0.5, 1.55); smile.rotation.x = Math.PI * 0.7; player.add(smile);
player.position.y = 1.9;
scene.add(player);

// Engeller ve Coinler (kısaltıldı)
let obstacles = [];
function createObstacle(z){
    let obs = new THREE.Group();
    let main = new THREE.Mesh(new THREE.BoxGeometry(7.5,7.5,8), new THREE.MeshLambertMaterial({color:0x8B4513}));
    main.position.y = 3.75; obs.add(main);
    let roof = new THREE.Mesh(new THREE.ConeGeometry(6,4,4), new THREE.MeshLambertMaterial({color:0xB22222}));
    roof.position.y = 9; obs.add(roof);
    obs.position.set(Math.random()>0.5 ? -13 : 13, 0, z);
    scene.add(obs);
    return obs;
}
for(let i=0; i<16; i++) obstacles.push(createObstacle(-i*130));

let coins = [];
function spawnCoin(){
    if(!gameRunning) return;
    let isPowerUp = Math.random() < 0.18;
    let colors = [0xFFD700, 0x00BFFF, 0x32CD32, 0xFF00FF];
    let color = isPowerUp ? colors[Math.floor(Math.random()*colors.length)] : 0xFFD700;
    
    let c = new THREE.Mesh(new THREE.CylinderGeometry(0.9,0.9,0.4,16), new THREE.MeshPhongMaterial({color, emissive: color, emissiveIntensity: isPowerUp ? 0.8 : 0.4}));
    c.rotation.x = Math.PI/2;
    c.userData.isPowerUp = isPowerUp;
    c.userData.powerColor = color;
    c.position.set((Math.random()-0.5)*19, 4, -480);
    scene.add(c); coins.push(c);
}

// Şövalye + Araba aynı anda
function triggerSurpriseEvent(){
    if(Date.now() - lastSurprise < 18000) return;
    lastSurprise = Date.now();

    // Şövalye
    let side = Math.random() > 0.5 ? -13 : 13;
    surpriseKnight = new THREE.Group();
    let body = new THREE.Mesh(new THREE.BoxGeometry(10,18,8), new THREE.MeshLambertMaterial({color:0x333333}));
    body.position.y = 9; surpriseKnight.add(body);
    let sword = new THREE.Mesh(new THREE.BoxGeometry(1.5,12,1.5), new THREE.MeshLambertMaterial({color:0xaaaaaa}));
    sword.position.set(side > 0 ? 8 : -8, 9, 2);
    sword.rotation.z = side > 0 ? 0.8 : -0.8;
    surpriseKnight.add(sword);
    let eye1 = new THREE.Mesh(new THREE.SphereGeometry(1.8, 20, 20), new THREE.MeshPhongMaterial({color:0xff0000, emissive:0xff0000}));
    eye1.position.set(side > 0 ? 3 : -3, 13, 4); surpriseKnight.add(eye1);
    let eye2 = eye1.clone(); eye2.position.x = side > 0 ? -3 : 3; surpriseKnight.add(eye2);
    surpriseKnight.position.set(side, 0, player.position.z - 100);
    scene.add(surpriseKnight);

    // Araba
    spawnGirlfriendCar();

    scene.background = new THREE.Color(0x440000);
    isHorrorMode = true;
    horrorSound();

    setTimeout(() => {
        if(surpriseKnight){
            scene.remove(surpriseKnight);
            surpriseKnight = null;
            scene.background = new THREE.Color(0x87CEEB);
            isHorrorMode = false;
        }
    }, 5800);
}

function spawnGirlfriendCar(){
    if(girlfriendCar) return;
    girlfriendCar = new THREE.Group();
    
    let carBody = new THREE.Mesh(new THREE.BoxGeometry(10,5,7), new THREE.MeshLambertMaterial({color:0xFF69B4}));
    carBody.position.y = 3; girlfriendCar.add(carBody);
    
    for(let i=0; i<4; i++){
        let wheel = new THREE.Mesh(new THREE.CylinderGeometry(1.6,1.6,1.4,16), new THREE.MeshLambertMaterial({color:0x222222}));
        wheel.rotation.z = Math.PI/2;
        wheel.position.set(i%2?-4:4, 1.5, i<2?2.5:-2.5);
        girlfriendCar.add(wheel);
    }
    
    let gf = new THREE.Mesh(new THREE.SphereGeometry(2.1, 32, 32), new THREE.MeshPhongMaterial({color:0xFFB6C1}));
    gf.position.y = 7.5; girlfriendCar.add(gf);
    
    let gfHair = new THREE.Mesh(new THREE.SphereGeometry(2.5, 32, 32), new THREE.MeshPhongMaterial({color:0x4B0082}));
    gfHair.position.y = 8.8; girlfriendCar.add(gfHair);
    
    let gfEyeL = new THREE.Mesh(new THREE.SphereGeometry(0.35,16,16), new THREE.MeshPhongMaterial({color:0xffffff}));
    gfEyeL.position.set(-0.6,8,2.2); girlfriendCar.add(gfEyeL);
    let gfEyeR = gfEyeL.clone(); gfEyeR.position.x = 0.6; girlfriendCar.add(gfEyeR);
    
    let gfSmile = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.1, 8, 20), new THREE.MeshPhongMaterial({color:0x222222}));
    gfSmile.position.set(0,7.1,2.3); gfSmile.rotation.x = Math.PI * 0.7; girlfriendCar.add(gfSmile);
    
    let text = new THREE.Group();
    "SEVGILIN".split('').forEach((l, i) => {
        let m = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.4, 0.4), new THREE.MeshPhongMaterial({color:0xffffff}));
        m.position.set(i*1.1 - 4.5, 12, 1);
        text.add(m);
    });
    girlfriendCar.add(text);
    
    girlfriendCar.position.set(player.position.x, 0, player.position.z - 130);
    scene.add(girlfriendCar);
    
    girlfriendCheer();
    
    setTimeout(() => {
        if(!girlfriendCar) return;
        let anim = setInterval(() => {
            if(!girlfriendCar) { clearInterval(anim); return; }
            girlfriendCar.position.z += 5;
            if(girlfriendCar.position.z > player.position.z + 100){
                scene.remove(girlfriendCar);
                girlfriendCar = null;
                clearInterval(anim);
            }
        }, 30);
    }, 5000);
}

let keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; if((e.key === ' ' || e.key === 'Space') && !isJumping) jump(); });
window.addEventListener('keyup', e => keys[e.key] = false);

leftBtn.onpointerdown = e => {e.preventDefault(); keys['ArrowLeft']=true;};
rightBtn.onpointerdown = e => {e.preventDefault(); keys['ArrowRight']=true;};
leftBtn.onpointerup = () => keys['ArrowLeft']=false;
rightBtn.onpointerup = () => keys['ArrowRight']=false;

renderer.domElement.addEventListener('touchstart', e => { if(e.touches[0].clientY < innerHeight * 0.45) jump(); });

function jump(){ if(!isJumping){ isJumping=true; velocityY=0.29; jumpSound(); } }

camera.position.set(0, 13, 24);

function resetGame(){
    score=0; speed=2.4; velocityY=0; isJumping=false; lastSurprise=0; powerUpColor=null; isHorrorMode=false;
    scoreBoard.innerText="SKOR 0";
    player.position.set(0,1.9,0);
    player.children[0].material.color.set(0xffee88);
    obstacles.forEach((o,i)=> o.position.z = -i*130);
    coins.forEach(c=>scene.remove(c)); coins=[];
    if(surpriseKnight){ scene.remove(surpriseKnight); surpriseKnight=null; }
    if(girlfriendCar){ scene.remove(girlfriendCar); girlfriendCar=null; }
    scene.background = new THREE.Color(0x87CEEB);
}

function gameOver(){
    gameRunning=false;
    crashSound();
    finalScoreEl.innerText = `Skorun: ${score}`;
    gameOverScreen.style.display="flex";
}

function animate(){
    requestAnimationFrame(animate);
    if(!gameRunning){ renderer.render(scene,camera); return; }

    if((keys['ArrowLeft']||keys['a']||keys['A']) && player.position.x > -15.5) player.position.x -= 0.45;
    if((keys['ArrowRight']||keys['d']||keys['D']) && player.position.x < 15.5) player.position.x += 0.45;

    if(isJumping){
        player.position.y += velocityY;
        velocityY -= 0.018;
        if(player.position.y <= 1.9){ player.position.y=1.9; isJumping=false; }
    }

    for(let obs of obstacles){
        obs.position.z += speed;
        if(obs.position.z > 40) obs.position.z -= 2080;
        if(Math.abs(obs.position.z - player.position.z) < 5 && Math.abs(obs.position.x - player.position.x) < 5.5 && player.position.y < 8){
            gameOver(); return;
        }
    }

    for(let i=coins.length-1;i>=0;i--){
        let c=coins[i];
        c.position.z += speed; c.rotation.z += 0.08;
        if(Math.abs(c.position.z-player.position.z)<3.8 && Math.abs(c.position.x-player.position.x)<3.2){
            if(c.userData.isPowerUp){
                powerUpSound();
                powerUpColor = c.userData.powerColor;
                powerUpEndTime = Date.now() + 10000;
                player.children[0].material.color.set(powerUpColor);
                score += 150;
            } else {
                coinSound();
                score += 50;
            }
            scoreBoard.innerText="SKOR "+score;
            scene.remove(c); coins.splice(i,1);
        }
        if(c.position.z>60){ scene.remove(c); coins.splice(i,1); }
    }

    if(score >= 200 && score % 200 === 0) triggerSurpriseEvent();

    camera.position.x += (player.position.x*0.65 - camera.position.x)*0.13;
    camera.position.z = player.position.z + 24;
    camera.lookAt(player.position.x*0.5, 6, player.position.z - 40);

    if(score % 400 === 0 && score > 0) speed = Math.min(6.8, speed + 0.08);

    renderer.render(scene, camera);
}

// Müzik
function startMusic(){
    if(musicTimer) clearInterval(musicTimer);
    let idx = 0;
    musicTimer = setInterval(() => {
        if(!musicEnabled || !gameRunning) return;
        let freqs = isHorrorMode ? [140, 90, 180, 110] : [262,330,392,440,523,440,392,330];
        play(freqs[idx % freqs.length], isHorrorMode ? 260 : 180);
        idx++;
    }, isHorrorMode ? 170 : 230);
}

musicBtn.onclick = () => { initAudio(); musicEnabled = !musicEnabled; musicBtn.innerText = musicEnabled ? "🔊" : "🔇"; };

startBtn.onclick = () => { menu.style.display = "none"; storyScreen.style.display = "flex"; };
continueBtn.onclick = () => {
    storyScreen.style.display = "none";
    initAudio();
    gameRunning = true;
    resetGame();
    animate();
    startMusic();
};

restartBtn.onclick = () => { gameOverScreen.style.display = "none"; resetGame(); gameRunning = true; startMusic(); };

setInterval(() => { if(gameRunning) spawnCoin(); }, 900);

window.addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
    </html>
