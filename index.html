<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #start { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 30px 60px; font-size: 30px; cursor: pointer; background: #0000FF; color: white; border: none; border-radius: 20px; }
    </style>
</head>
<body>
    <button id="start">START GAME</button>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        let scene, camera, renderer, polis, gameOn = false;
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        polis = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshBasicMaterial({color: 0x0000FF}));
        polis.position.set(0, 0, -5);
        scene.add(polis);
        camera.position.set(0, 0, 0);
        document.getElementById('start').onclick = (e) => { e.target.style.display = 'none'; gameOn = true; };
        function animate() {
            requestAnimationFrame(animate);
            if(gameOn) polis.rotation.y += 0.05;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
