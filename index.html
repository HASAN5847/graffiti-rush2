<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3D Grafiti Kacisi</title>
<style>
body { margin:0; background:#000; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; }
#gameContainer { position:relative; width:400px; height:700px; border:4px solid #555; background:#222; }
#ui { position:absolute; top:10px; right:10px; color:white; font-family:Arial; text-align:right; pointer-events:none; }
#overlay { position:absolute; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.9); color:white; }
button { padding:10px 20px; font-size:18px; cursor:pointer; background:#e74c3c; border:none; color:white; border-radius:5px; }
</style>
</head>
<body>

<div id="gameContainer">
    <canvas id="game" width="400" height="700"></canvas>
    <div id="ui">
        <div id="score">Skor 0</div>
        <div id="gold">Altin 0</div>
    </div>
    <div id="overlay">
        <h1>YAKALANDIN</h1>
        <button onclick="location.reload()">Tekrar Dene</button>
    </div>
</div>

<script>
const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let lane = 1
let score = 0
let gold = 0
let gameOver = false
let objects = []

// Perspektif Ayarları
const horizon = 200
const vanishingPoint = { x: 200, y: horizon }

document.addEventListener("keydown", (e) => {
    if(e.key === "ArrowLeft") lane = Math.max(0, lane - 1)
    if(e.key === "ArrowRight") lane = Math.min(2, lane + 1)
})

function spawn() {
    if(Math.random() < 0.03) {
        objects.push({ type: 'obs', lane: Math.floor(Math.random()*3), z: 0 })
    }
}

function update() {
    if(gameOver) return
    score++
    objects.forEach((o, i) => {
        o.z += 0.02
        if(o.z >= 1) objects.splice(i, 1)
        
        // Carpisma (z 0.8 ile 1.0 arasi derinlikte)
        if(o.z > 0.8 && o.lane === lane) gameOver = true
    })
    if(gameOver) document.getElementById("overlay").style.display = "flex"
    spawn()
}

function draw() {
    ctx.clearRect(0, 0, 400, 700)
    
    // Yol (Perspektif)
    ctx.fillStyle = "#333"
    ctx.beginPath()
    ctx.moveTo(200, 200)
    ctx.lineTo(0, 700)
    ctx.lineTo(400, 700)
    ctx.fill()

    // Objeleri Ciz
    objects.forEach(o => {
        let scale = o.z * 1.5
        let x = 200 + (o.lane - 1) * 150 * scale
        let y = 200 + o.z * 500
        
        ctx.fillStyle = "#e74c3c"
        ctx.fillRect(x - 20 * scale, y - 20 * scale, 40 * scale, 40 * scale)
    })

    // Karakter (Sabit)
    ctx.fillStyle = "#3498db"
    ctx.fillRect(180, 550, 40, 60)
    
    document.getElementById("score").innerText = "Skor " + Math.floor(score/10)
}

function loop() {
    update()
    draw()
    if(!gameOver) requestAnimationFrame(loop)
}

loop()
</script>
</body>
</html>
