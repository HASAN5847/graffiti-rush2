<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style> 
        body { margin: 0; overflow: hidden; background: #87CEEB; user-select: none; }
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white; }
        #startBtn { padding: 20px 40px; font-size: 20px; background: #228B22; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .btn { position: absolute; bottom: 50px; width: 100px; height: 100px; background: rgba(255,255,255,0.3); border-radius: 50%; z-index: 500; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 20px; }
        #leftBtn { left: 40px; }
        #rightBtn { right: 40px; }
    </style>
</head>
<body>
    <div id="menu">
        <h1>CIFTLIK YARISI</h1>
        <button id="startBtn">OYUNA BASLA</button>
    </div>
    <div id="leftBtn" class="btn">SOL</div>
    <div id="rightBtn" class="btn">SAG</div>
    
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        let scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        let camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
        let renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 1));

        let ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 5000), new THREE.MeshLambertMaterial({color: 0x4B964B}));
        ground.rotation.x = -Math.PI / 2;
        ground.position.z = -2500;
        scene.add(ground);

        let horse = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 2), new THREE.MeshLambertMaterial({color: 0x664422}));
        horse.position.set(0, 0.5, 0);
        scene.add(horse);

        let barns = [];
        for(let i = 0; i < 30; i++) {
            let b = new THREE.Mesh(new THREE.BoxGeometry(8, 8, 8), new THREE.MeshLambertMaterial({color: 0x8B4513}));
            b.position.set(i % 2 === 0 ? 15 : -15, 4, -i * 150);
            scene.add(b);
            barns.push(b);
        }

        camera.position.set(0, 4, 6);
        camera.lookAt(0, 1, -20);

        // Hareket mantigini guncelledik
        window.moveLeft = () => { if(horse.position.x > -6) horse.position.x -= 2; };
        window.moveRight = () => { if(horse.position.x < 6) horse.position.x += 2; };

        // Mobil icin en saglam dokunma olayi
        document.getElementById('leftBtn').addEventListener('pointerdown', (e) => { e.preventDefault(); moveLeft(); });
        document.getElementById('rightBtn').addEventListener('pointerdown', (e) => { e.preventDefault(); moveRight(); });

        function animate() {
            requestAnimationFrame(animate);
            barns.forEach(b => { 
                b.position.z += 2; 
                if(b.position.z > 100) b.position.z = -4500; 
            });
            renderer.render(scene, camera);
        }

        document.getElementById('startBtn').onclick = () => {
            document.getElementById('menu').style.display = 'none';
            animate();
        };
    </script>
</body>
</html>
