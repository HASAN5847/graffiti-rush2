<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial; }
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #222; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        #skorTablosu { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); color: white; padding: 15px; border-radius: 10px; z-index: 5; pointer-events: none; }
        button { padding: 20px 40px; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="skorTablosu">
        <div>Altın: <span id="altinSayisi">0</span></div>
        <div>Engel: <span id="engelSayisi">0</span></div>
    </div>
    <div id="menu"><button onclick="baslat()">OYUNU BAŞLAT</button></div>
    <script type="module">
        import * as THREE from 'https://cdn.skpack.dev/three';

        let oyunBasladi = false;
        let altinSay = 0;
        let engelSay = 0;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const road = new THREE.Mesh(new THREE.PlaneGeometry(10, 1000), new THREE.MeshBasicMaterial({color: 0x333333}));
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        const player = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshBasicMaterial({color: 0x00ff00}));
        player.position.set(0, 0.5, 0);
        scene.add(player);

        const obstacle = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshBasicMaterial({color: 0xff0000}));
        obstacle.position.set(0, 0.5, -20);
        scene.add(obstacle);

        const altin = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshBasicMaterial({color: 0xffff00}));
        altin.position.set(2, 0.5, -10);
        scene.add(altin);

        camera.position.set(0, 3, 5);

        window.baslat = () => { document.getElementById('menu').style.display = 'none'; oyunBasladi = true; };

        window.addEventListener('keydown', (e) => {
            if(e.key === "ArrowLeft" && player.position.x > -3) player.position.x -= 2;
            if(e.key === "ArrowRight" && player.position.x < 3) player.position.x += 2;
        });

        function animate() {
            requestAnimationFrame(animate);
            if (oyunBasladi) {
                obstacle.position.z += 0.3;
                altin.position.z += 0.3;

                // Engel geçildi mi?
                if (obstacle.position.z > 5) {
                    obstacle.position.z = -20;
                    obstacle.position.x = (Math.floor(Math.random() * 3) - 1) * 2;
                    engelSay++;
                    document.getElementById('engelSayisi').innerText = engelSay;
                }

                // Altın toplandı mı?
                if (Math.abs(player.position.z - altin.position.z) < 1 && Math.abs(player.position.x - altin.position.x) < 1) {
                    altinSay++;
                    document.getElementById('altinSayisi').innerText = altinSay;
                    altin.position.z = -30;
                    altin.position.x = (Math.floor(Math.random() * 3) - 1) * 2;
                }
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
